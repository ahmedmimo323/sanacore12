<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <title>Modern Login Page | Sanad Platform</title>
</head>
<body>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <div class="container" id="container">
        <div class="form-container sign-up">
            <form>
                <h1>Create Account</h1>
                <div class="social-icons">
                    <div id="g_id_onload"
                         data-client_id="846999771353-0ciq1t92qskm3n0k7i56of4c7bkdj629.apps.googleusercontent.com"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="outline"></div>
                </div>
                <span>or use your email for registration</span>
                
                <div class="input-group">
                    <input type="text" placeholder="Name" id="reg-name-input" required>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Password" id="reg-pass" required>
                    <i class="fa-solid fa-eye toggle-password" data-target="reg-pass"></i>
                </div>

                <button type="submit">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in">
            <form>
                <h1>Sign In</h1>
                <div class="social-icons">
                    <div class="g_id_signin" data-type="icon" data-shape="circle" data-theme="outline"></div>
                </div>
                <span>or use your email password</span>
                <input type="email" placeholder="Email" required>
                <div class="input-group">
                    <input type="password" placeholder="Password" id="login-pass" required>
                    <i class="fa-solid fa-eye toggle-password" data-target="login-pass"></i>
                </div>
                <a href="#" class="forgot">Forgot Your Password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Welcome Back!</h1>
                    <p>Enter your personal details to use all of site features</p>
                    <button class="hidden" id="login">Sign In</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Hello, Friend!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="hidden" id="register">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
